name: Sync Langfuse Production Prompt

on:
  repository_dispatch:
    types:
      - langfuse-prompt-update

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: langfuse-bg-marketing-chat-agent-production
  cancel-in-progress: true

env:
  PROMPT_NAME: "agents/bg-marketing-chat-agent-production"
  PROMPT_LABEL: "production"
  PROMPT_FILE: "prompts/agents/bg-marketing-chat-agent-production.json"

jobs:
  sync-production-prompt:
    name: Fetch and commit production prompt
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.client_payload.prompt.name == 'agents/bg-marketing-chat-agent-production' &&
        contains(github.event.client_payload.prompt.labels, 'production')
      )

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Langfuse SDK
        run: python -m pip install --upgrade "langfuse>=3,<4"

      - name: Fetch production prompt from Langfuse
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from langfuse import get_client

          prompt_name = os.environ["PROMPT_NAME"]
          prompt_label = os.environ["PROMPT_LABEL"]
          output_file = Path(os.environ["PROMPT_FILE"])

          langfuse = get_client()

          prompt = langfuse.get_prompt(
              prompt_name,
              label=prompt_label,
          )

          prompt_content = prompt.prompt

          output = {
              "name": prompt_name,
              "version": getattr(prompt, "version", None),
              "labels": getattr(prompt, "labels", []),
              "type": getattr(prompt, "type", None),
              "config": getattr(prompt, "config", {}) or {},
              "prompt": prompt_content,
          }

          output_file.parent.mkdir(parents=True, exist_ok=True)
          output_file.write_text(
              json.dumps(output, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          print(
              f"Fetched Langfuse prompt '{prompt_name}' "
              f"with label '{prompt_label}', version {output['version']}."
          )
          print(f"Saved to {output_file}.")
          PY

      - name: Validate exported prompt
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          prompt_name = os.environ["PROMPT_NAME"]
          prompt_label = os.environ["PROMPT_LABEL"]
          prompt_file = Path(os.environ["PROMPT_FILE"])

          if not prompt_file.is_file():
              raise SystemExit(f"Prompt file was not created: {prompt_file}")

          data = json.loads(prompt_file.read_text(encoding="utf-8"))

          if data.get("name") != prompt_name:
              raise SystemExit(
                  f"Unexpected prompt name: {data.get('name')!r}"
              )

          labels = data.get("labels") or []
          if prompt_label not in labels:
              raise SystemExit(
                  f"Fetched prompt does not carry the '{prompt_label}' label."
              )

          content = data.get("prompt")
          if content is None or content == "" or content == []:
              raise SystemExit("Prompt content is empty.")

          if data.get("version") is None:
              raise SystemExit("Prompt version is missing.")

          print(
              f"Validation passed for '{prompt_name}', "
              f"version {data['version']}."
          )
          PY

      - name: Commit updated prompt
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- "${PROMPT_FILE}"; then
            echo "The production prompt has not changed."
            exit 0
          fi

          git config user.name "langfuse-prompt-bot"
          git config user.email "langfuse-prompt-bot@users.noreply.github.com"

          git add "${PROMPT_FILE}"
          git commit -m "Sync Langfuse production prompt"

          git pull --rebase origin "${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
