name: Sync Versioned Langfuse Latest Prompt

on:
  repository_dispatch:
    types:
      - langfuse-latest-prompt-update
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: langfuse-bg-marketing-chat-agent-latest
  cancel-in-progress: true

env:
  PROMPT_NAME: "agents/bg-marketing-chat-agent-latest"
  PROMPT_LABEL: "latest"
  PROMPT_ROOT: "prompts"
  AGENT_DIR: "prompts/agents/bg-marketing-chat-agent-latest"
  LEGACY_PROMPT_FILE: "prompts/agents/bg-marketing-chat-agent-latest.json"

jobs:
  sync-latest-prompt:
    name: Fetch and commit versioned latest prompt
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.client_payload.prompt.name == 'agents/bg-marketing-chat-agent-latest'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Langfuse SDK
        run: python -m pip install --upgrade "langfuse>=3,<4"

      - name: Fetch and export latest prompt
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from typing import Any

          from langfuse import get_client

          prompt_name = os.environ["PROMPT_NAME"]
          prompt_label = os.environ["PROMPT_LABEL"]
          agent_dir = Path(os.environ["AGENT_DIR"])
          legacy_prompt_file = Path(os.environ["LEGACY_PROMPT_FILE"])

          langfuse = get_client()
          prompt = langfuse.get_prompt(
              prompt_name,
              label=prompt_label,
          )

          version = getattr(prompt, "version", None)
          version_text = str(version)

          if not re.fullmatch(r"\d+", version_text):
              raise SystemExit(
                  f"Unexpected Langfuse prompt version: {version!r}"
              )

          labels = getattr(prompt, "labels", []) or []
          if prompt_label not in labels:
              raise SystemExit(
                  f"Fetched prompt does not carry the "
                  f"'{prompt_label}' label."
              )

          prompt_content = prompt.prompt
          if prompt_content in (None, "", []):
              raise SystemExit("Prompt content is empty.")

          prompt_slug = Path(prompt_name).name
          version_dir = agent_dir / f"version-{version_text}"
          json_file = (
              version_dir
              / f"{prompt_slug}-v{version_text}.json"
          )
          markdown_file = version_dir / "prompt.md"

          def normalise_text(value: str) -> str:
              return value.replace("\r\n", "\n").replace("\r", "\n")

          def render_content(value: Any) -> str:
              if isinstance(value, str):
                  return normalise_text(value).strip()

              if isinstance(value, list):
                  blocks = [render_content(item) for item in value]
                  return "\n\n".join(
                      block for block in blocks if block.strip()
                  ).strip()

              if isinstance(value, dict):
                  if isinstance(value.get("text"), str):
                      return normalise_text(value["text"]).strip()

                  if "content" in value:
                      return render_content(value["content"])

                  return (
                      "```json\n"
                      + json.dumps(
                          value,
                          indent=2,
                          ensure_ascii=False,
                      )
                      + "\n```"
                  )

              return str(value).strip()

          def render_markdown(value: Any) -> str:
              # Langfuse text prompt: preserve the prompt as Markdown.
              if isinstance(value, str):
                  return normalise_text(value).rstrip() + "\n"

              # Langfuse chat prompt: render each role as a Markdown section.
              if isinstance(value, list):
                  sections: list[str] = []

                  for index, message in enumerate(value, start=1):
                      if not isinstance(message, dict):
                          raise SystemExit(
                              f"Chat message {index} is not an object."
                          )

                      role = str(
                          message.get("role", "message")
                      ).strip()
                      heading = role.replace("_", " ").title()
                      body = render_content(
                          message.get("content", "")
                      )

                      if body:
                          sections.append(
                              f"## {heading}\n\n{body}"
                          )

                  if not sections:
                      raise SystemExit(
                          "Chat prompt contained no renderable messages."
                      )

                  return "\n\n".join(sections).rstrip() + "\n"

              return render_content(value).rstrip() + "\n"

          output = {
              "name": prompt_name,
              "version": version,
              "labels": labels,
              "type": getattr(prompt, "type", None),
              "config": getattr(prompt, "config", {}) or {},
              "prompt": prompt_content,
          }

          version_dir.mkdir(parents=True, exist_ok=True)

          json_file.write_text(
              json.dumps(
                  output,
                  indent=2,
                  ensure_ascii=False,
              )
              + "\n",
              encoding="utf-8",
          )

          markdown_file.write_text(
              render_markdown(prompt_content),
              encoding="utf-8",
          )

          # Remove the old flat export now that versioned storage is used.
          if legacy_prompt_file.exists():
              legacy_prompt_file.unlink()

          if not json_file.is_file():
              raise SystemExit(f"JSON file was not created: {json_file}")

          if not markdown_file.is_file():
              raise SystemExit(
                  f"Markdown file was not created: {markdown_file}"
              )

          if not markdown_file.read_text(
              encoding="utf-8"
          ).strip():
              raise SystemExit("Markdown file is empty.")

          print(
              f"Fetched '{prompt_name}' latest version "
              f"{version_text}."
          )
          print(f"Created JSON: {json_file}")
          print(f"Created Markdown: {markdown_file}")
          PY

      - name: Show generated files
        run: |
          find "${AGENT_DIR}" -maxdepth 3 -type f -print | sort

      - name: Commit versioned prompt files
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "langfuse-prompt-bot"
          git config user.email \
            "langfuse-prompt-bot@users.noreply.github.com"

          # Stage the whole prompts tree so Git sees new folders,
          # new files, updates, and deletion of the old flat JSON.
          git add -A -- "${PROMPT_ROOT}"

          # Check staged changes after git add.
          if git diff --cached --quiet; then
            echo "This latest version is already stored and unchanged."
            exit 0
          fi

          PROMPT_VERSION="$(
            find "${AGENT_DIR}" -maxdepth 1 -type d \
              -name 'version-*' -printf '%f\n' \
              | sed 's/^version-//' \
              | sort -n \
              | tail -1
          )"

          git commit -m \
            "Sync ${PROMPT_NAME} latest prompt v${PROMPT_VERSION}"

          git pull --rebase origin "${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
